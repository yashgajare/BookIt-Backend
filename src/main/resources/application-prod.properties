# === Database ===
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://mysql:3306/bookit_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:my_root_password}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}

# === Security ===
spring.security.user.name=${SPRING_SECURITY_USER_NAME:admin}
spring.security.user.password=${SPRING_SECURITY_USER_PASSWORD:admin123}
logging.level.org.springframework.security=${LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY:INFO}

# === JWT ===
spring.app.jwtSecret=${SPRING_APP_JWTSECRET:thisisasecretkey}
spring.app.jwtExpirationMs=${SPRING_APP_JWTEXPIRATIONMS:86400000}

# === Dev Tools ===
spring.devtools.restart.enabled=${SPRING_DEVTOOLS_RESTART_ENABLED:false}

# === Misc ===
frontend.url=${FRONTEND_URL:http://localhost:3000}
logging.level.root=${LOGGING_LEVEL_ROOT:INFO}

# === Mail ===
spring.mail.host=${SPRING_MAIL_HOST:smtp.example.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:your@email.com}
spring.mail.password=${SPRING_MAIL_PASSWORD:password}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:true}

# === File Upload ===
spring.servlet.multipart.max-file-size=${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:20MB}
